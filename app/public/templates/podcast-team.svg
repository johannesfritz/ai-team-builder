<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" role="img" aria-label="Podcast team workflow chain: rule loads, then content-analyst, script-writer, script-reviewer, voice-producer, audio-engineer, qa-reviewer, ending in produce-episode command">
  <defs>
    <marker id="pt-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52525b"/>
    </marker>
  </defs>
  <style>
    .pt-label { font: 10px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #fff; }
    .pt-caption { font: 9px ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #71717a; }
  </style>

  <!-- Rule (setup) -->
  <rect x="20" y="20" width="84" height="28" rx="4" fill="#3b82f6"/>
  <text x="62" y="38" text-anchor="middle" class="pt-label">production-standards</text>
  <text x="62" y="62" text-anchor="middle" class="pt-caption">rule</text>

  <!-- Pipeline agents -->
  <g>
    <rect x="20" y="100" width="84" height="28" rx="4" fill="#ef4444"/>
    <text x="62" y="118" text-anchor="middle" class="pt-label">content-analyst</text>

    <rect x="124" y="100" width="84" height="28" rx="4" fill="#ef4444"/>
    <text x="166" y="118" text-anchor="middle" class="pt-label">script-writer</text>

    <rect x="228" y="100" width="84" height="28" rx="4" fill="#ef4444"/>
    <text x="270" y="118" text-anchor="middle" class="pt-label">script-reviewer</text>

    <rect x="332" y="100" width="84" height="28" rx="4" fill="#ef4444"/>
    <text x="374" y="118" text-anchor="middle" class="pt-label">voice-producer</text>

    <rect x="436" y="100" width="84" height="28" rx="4" fill="#ef4444"/>
    <text x="478" y="118" text-anchor="middle" class="pt-label">audio-engineer</text>

    <rect x="540" y="100" width="84" height="28" rx="4" fill="#ef4444"/>
    <text x="582" y="118" text-anchor="middle" class="pt-label">qa-reviewer</text>
  </g>

  <!-- Parallel branch: fact-checker -->
  <rect x="228" y="150" width="84" height="28" rx="4" fill="#ef4444"/>
  <text x="270" y="168" text-anchor="middle" class="pt-label">fact-checker</text>

  <!-- Command (entry) -->
  <rect x="644" y="100" width="60" height="28" rx="4" fill="#a855f7"/>
  <text x="674" y="118" text-anchor="middle" class="pt-label">/produce</text>

  <!-- Pipeline arrows -->
  <line x1="104" y1="114" x2="124" y2="114" stroke="#52525b" stroke-width="1.5" marker-end="url(#pt-arrow)"/>
  <line x1="208" y1="114" x2="228" y2="114" stroke="#52525b" stroke-width="1.5" marker-end="url(#pt-arrow)"/>
  <line x1="312" y1="114" x2="332" y2="114" stroke="#52525b" stroke-width="1.5" marker-end="url(#pt-arrow)"/>
  <line x1="416" y1="114" x2="436" y2="114" stroke="#52525b" stroke-width="1.5" marker-end="url(#pt-arrow)"/>
  <line x1="520" y1="114" x2="540" y2="114" stroke="#52525b" stroke-width="1.5" marker-end="url(#pt-arrow)"/>
  <line x1="624" y1="114" x2="644" y2="114" stroke="#52525b" stroke-width="1.5" marker-end="url(#pt-arrow)"/>

  <!-- Parallel branch arrows: script-writer → fact-checker → voice-producer -->
  <path d="M 166 128 Q 166 150 228 164" stroke="#52525b" stroke-width="1.5" fill="none" marker-end="url(#pt-arrow)"/>
  <path d="M 312 164 Q 374 150 374 128" stroke="#52525b" stroke-width="1.5" fill="none" marker-end="url(#pt-arrow)"/>

  <!-- Setup phase label -->
  <text x="20" y="13" class="pt-caption">SETUP</text>
  <text x="20" y="93" class="pt-caption">EXECUTE (pipeline)</text>
  <text x="644" y="93" class="pt-caption">ENTRY</text>
</svg>
