# Reference nginx config for ai-team-builder.
# Add inside the server block for jfritz.xyz (port 443 / HTTPS).

# Streaming SSE forwarder for the Anthropic Messages API.
# - proxy_buffering off so token deltas reach the browser immediately.
# - gzip off because the SSE consumer reads raw bytes via fetch().body.getReader();
#   gzip would land 1f 8b magic bytes in the parser buffer and corrupt the stream.
# - chunked_transfer_encoding on so the response is sent without Content-Length.
# - long timeouts because LLM responses can take 30-60s for the full stream.
location /ai-team-builder/api/anthropic/ {
    proxy_pass http://127.0.0.1:3848/anthropic/;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    chunked_transfer_encoding on;
    gzip off;
}

# Non-streaming passthrough for GitHub OAuth + GitHub API + health.
location /ai-team-builder/api/ {
    proxy_pass http://127.0.0.1:3848/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}
